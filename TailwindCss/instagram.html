<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram - Bom Caminho</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="imgInstaLogo.png" type="image/x-icon">
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
</head>

<body class="bg-white dark:bg-gray-950 dark:text-white">
  <button
        id="toggleBtn"
        class="px-6 py-3 text-4xl"
      >
      </button>
  <div class="max-w-4xl mx-auto p-4 md:p-6">
    

   
    <div class="flex flex-col md:flex-row items-center gap-4 md:gap-8">

 
      <div class="w-24 h-24 md:w-32 md:h-32 rounded-full overflow-hidden">
        <img src="imgBomCaminhoLogo.png" class="w-full h-full object-cover">
      </div>

   
      <div class="flex-1 text-center md:text-left">

        <div class="flex flex-col md:flex-row items-center gap-2 md:gap-4 mb-3">
          <h1 class="text-lg md:text-2xl font-semibold">
            PrefeituraBomCaminhoRS
          </h1>

          <div class="flex gap-2">
            <button class="bg-blue-700 text-white px-3 py-1 rounded text-sm">
              Follow
            </button>
            <button class="border px-3 py-1 rounded text-sm">
              Message
            </button>
          </div>
        </div>

      
        <div class="flex justify-center md:justify-start gap-4 md:gap-6 mb-3 text-sm">
          <h4><b>11 mil</b> posts</h4>
          <h4><b>67 mil</b> seguidores</h4>
          <h4><b>54</b> seguindo</h4>
        </div>

    
        <div class="text-sm">
          <p class="font-semibold">Prefeitura Municipal de Bom Caminho</p>
          <p class="text-gray-600">Organização Governamental</p>
          <p>Perfil Oficial da cidade Bom Caminho - Litoral Gaúcho.</p>
          <a href="main.html" target="_blank" class="text-blue-500">bomcaminho.rs.gov.br</a>
        </div>

      </div>
    </div>

 
    <div class="flex gap-4 mt-6 overflow-x-auto mt-15">

      <div class="text-center min-w-[70px]">
        <div class="w-14 h-14 md:w-16 md:h-16 rounded-full border p-1">
          <img src="imgBlueSun.webp" class="rounded-full">
        </div>
        <p class="text-xs mt-1">Festa</p>
      </div>

      <div class="text-center min-w-[70px]">
        <div class="w-14 h-14 md:w-16 md:h-16 rounded-full border p-1">
          <img src="imgParadise.webp" class="rounded-full">
        </div>
        <p class="text-xs mt-1">Paisagens</p>
      </div>

      <div class="text-center min-w-[70px]">
        <div class="w-14 h-14 md:w-16 md:h-16 rounded-full border p-1">
          <img src="imgTiktok.webp" class="rounded-full">
        </div>
        <p class="text-xs mt-1">TikTok</p>
      </div>

         <div class="text-center min-w-[70px]">
        <div class="w-14 h-14 md:w-16 md:h-16 rounded-full border p-1">
          <img src="imgColeta.webp" class="rounded-full">
        </div>
        <p class="text-xs mt-1">Coleta Seletiva</p>
      </div>

        <div class="text-center min-w-[70px]">
        <div class="w-14 h-14 md:w-16 md:h-16 rounded-full border p-1">
          <img src="imgExpediente.webp" class="rounded-full">
        </div>
        <p class="text-xs mt-1">Expediente</p>
      </div>

    </div>

   
    <div class="border-t mt-6 border-gray-600 dark:border-gray-300"></div>

  
    <div class="grid grid-cols-3 gap-1 mt-4">
      <img src="imgPrefeito.png" class="border-2 border-white w-full aspect-square object-cover cursor-pointer hover:scale-110 transition dark:border-gray-800">
      <img src="imgDesfile.png" class="border-2 border-white w-full aspect-square object-cover cursor-pointer hover:scale-110 transition dark:border-gray-800">
      <img src="imgPraca.png" class="border-2 border-white w-full aspect-square object-cover cursor-pointer hover:scale-110 transition dark:border-gray-800" >
      <img src="imgPraia.png" class="border-2 border-white w-full aspect-square object-cover cursor-pointer hover:scale-110 transition dark:border-gray-800">
      <img src="imgCidade.png" class="border-2 border-white w-full aspect-square object-cover cursor-pointer hover:scale-110 transition dark:border-gray-800">
      <img src="imgFestaSol.png" class="border-2 border-white w-full aspect-square object-cover cursor-pointer hover:scale-110 transition dark:border-gray-800">
    </div>

  </div>
  <script src="scriptDarkMode.js"></script>
</body>

</html>
