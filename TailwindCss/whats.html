<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp - Bom Caminho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
  </head>

  <body class="bg-gray-200 dark:bg-black">
    <header class="flex justify-between items-center p-5 bg-white border-b dark:bg-gray-950">
      <button
        id="toggleBtn"
        class="text-xl md:text-xl px-6 py-3 bg-green-600 text-white  mx-5  rounded-full shadow hover:bg-gray-800 transition-colors duration-300"
      ></button>
      <br />
      <h2
        class="text-green-500 text-2xl font-bold hover:text-black cursor-pointer dark:hover:text-white"
      >
        WhatsApp
      </h2>

      <nav class="hidden lg:flex mx-auto">
        <ul class="cursor-pointer flex gap-6 font-medium text-gray-700">
          <li class="hover:text-black dark:hover:text-white">Recursos</li>
          <li class="hover:text-black dark:hover:text-white">Privacidade</li>
          <li class="hover:text-black dark:hover:text-white">Central de Ajuda</li>
          <li class="hover:text-black dark:hover:text-white">Blog</li>
          <li class="hover:text-black dark:hover:text-white">Para empresas</li>
          <li class="hover:text-black dark:hover:text-white">Apps</li>
        </ul>
      </nav>

      <div class="flex items-center gap-3 ml-auto md:ml-0">
        <button
          class="cursor-pointer border border-black px-3 py-1 md:px-5 md:py-2 rounded-full text-xs md:text-sm font-semibold hover:bg-black hover:text-white text-sm md:text-base dark:text-white dark:border-white dark:hover:text-green-500 dark:hover:border-green-500"
        >
          Conectar >
        </button>

        <button
          class="hidden md:block cursor-pointer border border-black bg-green-500 px-5 py-2 rounded-full font-semibold hover:bg-black hover:text-green-500 dark:border-green-500"
        >
          Baixar
        </button>
      </div>
    </header>
    <div class="w-full h-32 md:h-48 bg-white dark:bg-black"></div>

    <div class="max-w-3xl mx-auto px-4 dark">
      <div class="flex flex-col items-center text-center -mt-20 mb-12">
        <img
          src="imgBomCaminhoBrasao.png"
          class="w-24 h-24 md:w-28 md:h-28 rounded-full border-4 border-green-500"
        />

        <h1 class="text-black text-lg md:text-xl font-semibold mt-2 dark:text-green-500">
          Prefeitura de Bom Caminho #03
        </h1>

        <p class="text-sm text-gray-800 text-black font-semibold dark:text-gray-400">
          Convite para conversa em grupo
        </p>
      </div>

      <div class="flex flex-col items-center gap-3 mt-6">
        <button
          class="w-52 md:w-72 bg-green-500 text-black py-2 rounded-full font-semibold border-2 border-black hover:bg-black hover:text-green-500 dark:border-green-500" 
        >
          Abrir no WhatsApp
        </button>

        <button
          class="w-52 md:w-72 bg-white border-2 border-black py-2 rounded-full font-semibold hover:bg-black hover:text-white dark:border-2 dark:border-green-500"
        >
          Usar WhatsApp Web
        </button>

        <p class="text-sm text-gray-500 dark:text-gray-300 font-bold">Não tem o app? Baixe agora</p>
      </div>
    </div>
    <script src="scriptDarkMode.js"></script>
  </body>
</html>
